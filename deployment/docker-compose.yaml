services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-trinity_dev}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  django:
    build:
      context: ../core_service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../core_service/.env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      ALLOWED_HOSTS: "localhost,127.0.0.1,django,nginx"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             python manage.py loaddata fixtures/initial_catalog.json fixtures/initial_centers.json || true ;
             gunicorn core_service.wsgi:application --bind 0.0.0.0:8000 --workers 4"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/health/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  fast_api:
    build:
      context: ../fast_api_services
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../fast_api_services/.env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
      CHROMA_PERSIST_DIR: /app/chromadb_data
      DOCS_DIR: /app/docs
    volumes:
      - chroma_data:/app/chromadb_data
      - ../docs:/app/docs:ro
      - ../fast_api_services:/app/fast_api_services:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn fast_api_services.main:app --host 0.0.0.0 --port 8001 --reload
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  celery:
    build:
      context: ../core_service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../core_service/.env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A core_service worker -l info -Q default

  celery-beat:
    build:
      context: ../core_service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../core_service/.env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A core_service beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - frontend_dist:/usr/share/nginx/html
    depends_on:
      - django
      - fast_api

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Serve React build from the frontend container's /usr/share/nginx/html
      # via a named volume shared between frontend and nginx
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - django
      - fast_api
      - frontend

volumes:
  postgres_data:
  chroma_data:
  frontend_dist:

